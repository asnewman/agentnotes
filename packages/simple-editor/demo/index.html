<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpleEditor Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .container {
      border: 1px solid #ccc;
      padding: 16px;
      margin-bottom: 20px;
      background-color: #f9f9f9;
    }
    button {
      padding: 8px 16px;
      margin-right: 8px;
      cursor: pointer;
    }
    input {
      padding: 8px;
      width: 300px;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div id="editor-container" class="container"></div>

  <div>
    <input type="text" id="text-input" placeholder="Enter new text...">
    <button id="update-btn">Update Text</button>
  </div>

  <div>
    <label>Cursor Position: <input type="number" id="cursor-pos-input" min="0" value="0"></label>
    <button id="cursor-prev">←</button>
    <button id="cursor-next">→</button>
    <button id="cursor-clear">Clear Cursor</button>
  </div>

  <script type="module">
    import { SimpleEditor } from '../dist/index.js';

    // Track state in local variables
    let text = [
      { value: 'Introduction to SimpleEditor', marks: ['bold'], size: '24px' },
      { value: '\n\n', marks: [] },
      { value: 'SimpleEditor is a lightweight text editor with support for rich text styling. It provides an example of how to build a custom editor with marks and size properties.\n\n', marks: [] },
      { value: 'Key Features', marks: ['bold'], size: '18px' },
      { value: '\n\n', marks: [] },
      { value: 'Bold text support', marks: ['bold'] },
      { value: ' - use the marks property\n', marks: [] },
      { value: 'Italic text support', marks: ['italic'] },
      { value: ' - combine with other marks\n', marks: [] },
      { value: 'Custom font sizes', marks: [] },
      { value: ' - set via the size property\n', marks: [] },
      { value: 'Cursor positioning', marks: ['bold'] },
      { value: ' - navigate through text\n\n', marks: [] },
      { value: 'Getting Started', marks: ['bold'], size: '18px' },
      { value: '\n\n', marks: [] },
      { value: 'Edit the text above or use the controls below to update the editor content and cursor position.', marks: ['italic'] }
    ];
    let cursorPos = 0;

    const textInput = document.getElementById('text-input');
    const updateBtn = document.getElementById('update-btn');
    const cursorPosInput = document.getElementById('cursor-pos-input');
    const cursorPrevBtn = document.getElementById('cursor-prev');
    const cursorNextBtn = document.getElementById('cursor-next');
    const cursorClearBtn = document.getElementById('cursor-clear');

    // Helper to clear container and recreate editor
    function rerender() {
      new SimpleEditor('editor-container', { text, cursorPos });
    }

    // Initial render
    rerender();

    // Update text
    updateBtn.addEventListener('click', () => {
      if (textInput.value) {
        text = [{ value: textInput.value, marks: [] }];
        // Clamp cursor to new text length
        const totalLength = text.reduce((sum, n) => sum + n.value.length, 0);
        cursorPos = Math.min(cursorPos, totalLength);
        cursorPosInput.value = cursorPos;
        textInput.value = '';
        rerender();
      }
    });

    // Update cursor position
    cursorPosInput.addEventListener('change', () => {
      cursorPos = parseInt(cursorPosInput.value);
      rerender();
    });

    // Move cursor left
    cursorPrevBtn.addEventListener('click', () => {
      cursorPos = Math.max(0, cursorPos - 1);
      cursorPosInput.value = cursorPos;
      rerender();
    });

    // Move cursor right
    cursorNextBtn.addEventListener('click', () => {
      const totalLength = text.reduce((sum, n) => sum + n.value.length, 0);
      cursorPos = Math.min(totalLength, cursorPos + 1);
      cursorPosInput.value = cursorPos;
      rerender();
    });

    // Clear cursor
    cursorClearBtn.addEventListener('click', () => {
      cursorPos = -1;
      cursorPosInput.value = '0';
      rerender();
    });
  </script>
</body>
</html>
