<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpleEditor Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .container {
      border: 1px solid #ccc;
      padding: 16px;
      margin-bottom: 20px;
      background-color: #f9f9f9;
    }
    button {
      padding: 8px 16px;
      margin-right: 8px;
      cursor: pointer;
    }
    input {
      padding: 8px;
      width: 300px;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div id="editor-container" class="container"></div>

  <div>
    <input type="text" id="text-input" placeholder="Enter new text...">
    <button id="update-btn">Update Text</button>
  </div>

  <div>
    <label>Cursor Position: <input type="number" id="cursor-pos-input" min="0" value="0"></label>
    <button id="cursor-prev">←</button>
    <button id="cursor-next">→</button>
    <button id="cursor-clear">Clear Cursor</button>
  </div>

  <script type="module">
    import { SimpleEditor } from '../dist/index.js';

    // Track state in local variables
    let text = 'Hello, SimpleEditor!';
    let cursorPos = 0;

    const textInput = document.getElementById('text-input');
    const updateBtn = document.getElementById('update-btn');
    const cursorPosInput = document.getElementById('cursor-pos-input');
    const cursorPrevBtn = document.getElementById('cursor-prev');
    const cursorNextBtn = document.getElementById('cursor-next');
    const cursorClearBtn = document.getElementById('cursor-clear');

    // Helper to clear container and recreate editor
    function rerender() {
      new SimpleEditor('editor-container', { text, cursorPos });
    }

    // Initial render
    rerender();

    // Update text
    updateBtn.addEventListener('click', () => {
      if (textInput.value) {
        text = textInput.value;
        // Clamp cursor to new text length
        cursorPos = Math.min(cursorPos, text.length);
        cursorPosInput.value = cursorPos;
        textInput.value = '';
        rerender();
      }
    });

    // Update cursor position
    cursorPosInput.addEventListener('change', () => {
      cursorPos = parseInt(cursorPosInput.value);
      rerender();
    });

    // Move cursor left
    cursorPrevBtn.addEventListener('click', () => {
      cursorPos = Math.max(0, cursorPos - 1);
      cursorPosInput.value = cursorPos;
      rerender();
    });

    // Move cursor right
    cursorNextBtn.addEventListener('click', () => {
      cursorPos = Math.min(text.length, cursorPos + 1);
      cursorPosInput.value = cursorPos;
      rerender();
    });

    // Clear cursor
    cursorClearBtn.addEventListener('click', () => {
      cursorPos = -1;
      cursorPosInput.value = '0';
      rerender();
    });
  </script>
</body>
</html>
