<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpleEditor Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .editor-area {
      border: 1px solid #ccc;
      padding: 16px;
      min-height: 200px;
      background-color: #f9f9f9;
      cursor: text;
      position: relative;
    }
    .editor-area:focus-within {
      border-color: #4a90d9;
      outline: none;
    }
    .hidden-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      overflow: hidden;
    }
    .status-bar {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      font-family: monospace;
    }
    .hint {
      margin-bottom: 12px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <h2>SimpleEditor + Engine Demo</h2>
  <p class="hint">Click the editor area and start typing. Markdown syntax renders as styled text.</p>

  <div class="editor-area" id="editor-wrapper">
    <textarea class="hidden-input" id="hidden-input"></textarea>
    <div id="editor-container"></div>
  </div>
  <div class="status-bar" id="status-bar"></div>

  <script type="module">
    import { SimpleEditor, Engine } from '../dist/index.js';

    const INITIAL_TEXT = `# SimpleEditor Demo

This editor is powered by the **Engine** class. Type *markdown* and see it styled in real time.

## Features

**Bold text** with double asterisks
*Italic text* with single asterisks
# Heading 1
## Heading 2
### Heading 3

Start typing to try it out!`;

    const editorWrapper = document.getElementById('editor-wrapper');
    const hiddenInput = document.getElementById('hidden-input');
    const statusBar = document.getElementById('status-bar');

    const engine = new Engine({
      text: INITIAL_TEXT,
      cursorPos: INITIAL_TEXT.length,
      onChange(state) {
        new SimpleEditor('editor-container', {
          content: state.content,
          cursorPos: state.cursorPos,
        });
        statusBar.textContent = `cursor: ${state.cursorPos} | length: ${engine.getTextLength()}`;
      },
    });

    // Initial render
    const initialState = engine.getState();
    new SimpleEditor('editor-container', {
      content: initialState.content,
      cursorPos: initialState.cursorPos,
    });
    statusBar.textContent = `cursor: ${initialState.cursorPos} | length: ${engine.getTextLength()}`;

    // Focus the hidden input when clicking the editor area
    editorWrapper.addEventListener('click', () => {
      hiddenInput.focus();
    });

    // Keep hidden input focused
    hiddenInput.addEventListener('blur', () => {
      // Small delay so clicks on other elements still work
      setTimeout(() => hiddenInput.focus(), 10);
    });

    // Auto-focus on load
    hiddenInput.focus();

    // Handle keyboard input
    hiddenInput.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'Backspace':
          e.preventDefault();
          engine.dispatch({ type: 'DELETE_BACKWARD' });
          break;
        case 'ArrowLeft':
          e.preventDefault();
          engine.dispatch({ type: 'MOVE_CURSOR_LEFT' });
          break;
        case 'ArrowRight':
          e.preventDefault();
          engine.dispatch({ type: 'MOVE_CURSOR_RIGHT' });
          break;
        case 'ArrowUp':
          e.preventDefault();
          engine.dispatch({ type: 'MOVE_CURSOR_UP' });
          break;
        case 'ArrowDown':
          e.preventDefault();
          engine.dispatch({ type: 'MOVE_CURSOR_DOWN' });
          break;
        case 'Home':
          e.preventDefault();
          engine.dispatch({ type: 'MOVE_CURSOR_TO_START' });
          break;
        case 'End':
          e.preventDefault();
          engine.dispatch({ type: 'MOVE_CURSOR_TO_END' });
          break;
        case 'Enter':
          e.preventDefault();
          engine.dispatch({ type: 'INSERT_TEXT', text: '\n' });
          break;
      }
    });

    // Handle text input (captures typed characters and IME input)
    hiddenInput.addEventListener('input', (e) => {
      const text = hiddenInput.value;
      if (text) {
        engine.dispatch({ type: 'INSERT_TEXT', text });
        hiddenInput.value = '';
      }
    });
  </script>
</body>
</html>
